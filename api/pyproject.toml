[project]
name = "api"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "boto3>=1.42.89",
    "fastapi[standard]>=0.135.3",
    "psycopg2>=2.9.10",
    "pydantic>=2.13.1",
    "pyjwt>=2.0.0",
    "pyyaml>=6.0.2",
    "shapely>=2.1.2",
    "sqlmodel>=0.0.24",
    "typer>=0.15.3",
]

[dependency-groups]
dev = [
    "alembic>=1.17.2",
    "maturin>=1.10.2",
    "mypy>=1.20.1",
    "pydantic-settings>=2.12.0",
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.15.10",
    "types-pyyaml>=6.0.12.20250915",
    "types-boto3>=1.42.89",
    "ty>=0.0.30",
    "hypothesis>=6.152.1",
    "types-shapely>=2.1.0.20250917",
]

[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[tool.coverage.run]
relative_files = true

[tool.maturin]
features = ["pyo3/extension-module"]
python-source = "python"

[project.scripts]
cli = "api.cli:app"
